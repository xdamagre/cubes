<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>david martínez</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-left">david martínez</div>
    <div class="header-right">menu</div>
  </header>

  <div class="controls">
    <div class="control-group">
      <div class="control-label">
        <span>Gravetat Y</span>
        <span class="value" id="gv-value">1.00</span>
      </div>
      <input type="range" id="gv" min="-2" max="2" step="0.05" value="1">
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Gravetat X</span>
        <span class="value" id="gh-value">0.00</span>
      </div>
      <input type="range" id="gh" min="-2" max="2" step="0.05" value="0">
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
